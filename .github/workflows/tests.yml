name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Mock ROS 2 dependencies and install project ones
          pip install pytest pytest-cov httpx fastapi uvicorn pydantic langchain langchain-community langchain-openai langchain-google-genai langchain-ollama python-dotenv ultralytics typeguard "numpy<2" py_trees
          if [ -f requirements.txt ]; then
            grep -v "rclpy" requirements.txt > requirements_filtered.txt
            pip install -r requirements_filtered.txt
          fi

      - name: Run tests with pytest
        run: |
          # Create a dummy rclpy module to allow tests to run without full ROS 2 environment
          mkdir -p rclpy
          touch rclpy/__init__.py
          export PYTHONPATH=$PYTHONPATH:.
          pytest --cov=core --cov=shared --cov=web --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: false
