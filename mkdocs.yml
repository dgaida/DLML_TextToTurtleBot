site_name: TextToTurtleBot
site_description: Professionelle Dokumentation für das TextToTurtleBot Ökosystem
site_author: TextToTurtleBot Team

theme:
  name: material
  language: de
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - i18n:
      default_language: de
      languages:
        de: Deutsch
        en: English
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_category_heading: true
            import_policy: "clever"
            allow_inspect: true
  - mermaid2:
      arguments:
        theme: material
  - mike:
      alias_type: symlink

extra:
  version:
    provider: mike

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home:
    - de: de/index.md
    - en: en/index.md
  - Getting Started:
    - de: de/getting-started.md
    - en: en/getting-started.md
  - Installation:
    - de: de/installation.md
    - en: en/installation.md
  - Configuration:
    - de: de/configuration.md
    - en: en/configuration.md
  - Usage:
    - de: de/usage/index.md
    - en: en/usage/index.md
  - API:
    - de: de/api/index.md
    - en: en/api/index.md
  - Architecture:
    - de: de/architecture/index.md
    - en: en/architecture/index.md
  - Development:
    - de: de/development/index.md
    - en: en/development/index.md
    - Changelog:
      - de: de/development/changelog.md
      - en: en/development/changelog.md
    - Docstring Guide:
      - de: de/development/docstring-guide.md
      - en: en/development/docstring-guide.md
    - Versioning:
      - de: de/development/versioning.md
      - en: en/development/versioning.md
  - Troubleshooting:
    - de: de/troubleshooting.md
    - en: en/troubleshooting.md
  - Metrics:
    - de: de/metrics.md
    - en: en/metrics.md
