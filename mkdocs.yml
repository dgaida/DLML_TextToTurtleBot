site_name: TextToTurtleBot
site_description: Professionelle Dokumentation für das TextToTurtleBot Ökosystem
site_author: TextToTurtleBot Team
site_url: https://your-org.github.io/TextToTurtleBot/

theme:
  name: material
  language: de
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - i18n:
      default_language: de
      languages:
        de:
          name: Deutsch
          link: /de/
          build_site: true
        en:
          name: English
          link: /en/
          build_site: true
      nav_translations:
        en:
          Home: Home
          Erste Schritte: Getting Started
          Installation: Installation
          Konfiguration: Configuration
          Bedienung: Usage
          API Referenz: API Reference
          Architektur: Architecture
          Entwicklung: Development
          Übersicht: Overview
          Changelog: Changelog
          Docstring Guide: Docstring Guide
          Versionierung: Versioning
          Fehlerbehebung: Troubleshooting
          Metriken: Metrics
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_category_heading: true
            import_policy: "clever"
            allow_inspect: true
  - mermaid2:
      arguments:
        theme: material
  - mike:
      alias_type: symlink

extra:
  version:
    provider: mike

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Erste Schritte: getting-started.md
  - Installation: installation.md
  - Konfiguration: configuration.md
  - Bedienung: usage/index.md
  - API Referenz: api/index.md
  - Architektur: architecture/index.md
  - Entwicklung:
      - Übersicht: development/index.md
      - Changelog: development/changelog.md
      - Docstring Guide: development/docstring-guide.md
      - Versionierung: development/versioning.md
  - Fehlerbehebung: troubleshooting.md
  - Metriken: metrics.md
